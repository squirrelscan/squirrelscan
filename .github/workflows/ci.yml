name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NO_TELEMETRY: "1"

jobs:
  quality:
    name: Format, lint, and typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: ./.github/actions/setup-bun
      - name: Check formatting
        run: bun run format:check
      - name: Lint
        run: bun run lint
      - name: Typecheck all workspaces
        run: bun run typecheck
      - name: Check third-party notices
        run: bun run notices:check

  cli-tests:
    name: CLI tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: ./.github/actions/setup-bun
      - run: bun test

  dependency-audit:
    name: Dependency audit
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: ./.github/actions/setup-bun
      - run: bun run audit:dependencies

  engine-tests:
    name: Audit engine golden tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: ./.github/actions/setup-bun
      - run: bun run test:engine

  release-tooling:
    name: Release tooling tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: ./.github/actions/setup-bun
      - run: bun run test:release

  docs:
    name: Docs check and build
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: ./.github/actions/setup-bun
      - run: bun run docs:check
      - run: bun run docs:build

  build:
    name: Compile CLI
    needs: [cli-tests, engine-tests, release-tooling]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: ./.github/actions/setup-bun
      - run: bun run build

  psl-freshness:
    name: Public suffix data freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: ./.github/actions/setup-bun
      - run: bun run check:psl-freshness

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install detect-secrets==1.5.0
      - name: Reject new secret candidates
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline
