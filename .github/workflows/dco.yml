name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  signoff:
    name: Verify commit sign-offs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-offs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          failed=0
          while read -r commit; do
            [ -n "$commit" ] || continue
            if ! git show -s --format=%B "$commit" | grep -Eq '^Signed-off-by: .+ <[^>]+>$'; then
              echo "::error::Commit $commit is missing a Signed-off-by line. Use git commit -s."
              failed=1
            fi
          done < <(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")
          exit "$failed"
