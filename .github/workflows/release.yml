name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        type: choice
        options: [beta, stable]
      bump:
        description: Version bump
        required: true
        type: choice
        options: [patch, minor, major, promote]

concurrency:
  group: release
  cancel-in-progress: false

env:
  NO_TELEMETRY: "1"

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-bun
      - name: Compute version
        id: version
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          bun -e '
            import { computeNextVersion, resolveCurrentVersion } from "./scripts/release.ts";
            const pkg = await Bun.file("apps/cli/package.json").json();
            const current = await resolveCurrentVersion(pkg.version);
            const version = computeNextVersion(current, process.env.INPUT_CHANNEL, process.env.INPUT_BUMP);
            console.log("version=" + version);
            console.log("tag=v" + version);
            console.log("prerelease=" + (process.env.INPUT_CHANNEL === "beta"));
          ' >> "$GITHUB_OUTPUT"

  quality:
    name: Release quality gate
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-bun
      - name: Update manifests
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          bun -e '
            const path = "apps/cli/package.json";
            const pkg = await Bun.file(path).json();
            pkg.version = process.env.VERSION;
            await Bun.write(path, JSON.stringify(pkg, null, 2) + "\n");
          '
          bun run scripts/sync-plugin-manifests.ts --version "$VERSION"
          bun install
      - run: bun run format:check
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run notices:check
      - run: bun run audit:dependencies
      - run: bun test
      - run: bun run test:engine
      - run: bun run test:release

  tag:
    name: Create release tag
    needs: [version, quality]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-bun
      - name: Update manifests
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          bun -e '
            const path = "apps/cli/package.json";
            const pkg = await Bun.file(path).json();
            pkg.version = process.env.VERSION;
            await Bun.write(path, JSON.stringify(pkg, null, 2) + "\n");
          '
          bun run scripts/sync-plugin-manifests.ts --version "$VERSION"
          bun install
      - name: Commit and tag
        env:
          VERSION: ${{ needs.version.outputs.version }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/cli/package.json npm/package.json plugin.json .cursor-plugin/plugin.json .claude-plugin/plugin.json bun.lock
          git commit --signoff -m "chore(release): v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"

  build:
    name: Build release binaries
    needs: [version, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: ./.github/actions/setup-bun
      - name: Build all platforms
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: make build-all VERSION="$VERSION"
      - name: Generate manifest
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: make manifest VERSION="$VERSION"
      - name: Stage release assets
        run: |
          mkdir release-assets
          cp apps/cli/build/squirrel-* apps/cli/build/manifest.json LICENSE THIRD_PARTY_NOTICES.md release-assets/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-binaries
          path: release-assets/

  github-release:
    name: Publish GitHub release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-binaries
          path: release-assets
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release-assets/*
      - name: Resolve release notes
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          notes=$(awk -v "v=$VERSION" -f scripts/extract-changelog.awk CHANGELOG.md)
          if [ -z "${notes//[[:space:]]/}" ]; then
            notes="squirrelscan v${VERSION}"
          fi
          printf '%s\n' "$notes" > release-notes.md
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          PRERELEASE: ${{ needs.version.outputs.prerelease }}
        run: |
          flag=()
          if [ "$PRERELEASE" = true ]; then flag+=(--prerelease); fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            "${flag[@]}" \
            release-assets/squirrel-* \
            release-assets/manifest.json \
            release-assets/LICENSE \
            release-assets/THIRD_PARTY_NOTICES.md

  npm:
    name: Publish npm package
    needs: [version, github-release]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.14.0"
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.5.1
      - name: Publish with provenance
        working-directory: npm
        run: npm publish --access public --provenance

  hosted-release-refresh:
    name: Refresh hosted release cache
    needs: [version, github-release]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Notify private website
        env:
          RELEASE_WEBHOOK_SECRET: ${{ secrets.RELEASE_WEBHOOK_SECRET }}
        run: |
          test -n "$RELEASE_WEBHOOK_SECRET"
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${RELEASE_WEBHOOK_SECRET}" \
            --header "Content-Type: application/json" \
            https://squirrelscan.com/api/release-refresh

  install-tests:
    name: Verify installers
    needs: [version, github-release]
    uses: ./.github/workflows/test-install.yml
    with:
      version: ${{ needs.version.outputs.tag }}
