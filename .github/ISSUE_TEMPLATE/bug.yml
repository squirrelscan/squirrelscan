name: Bug report
description: Report reproducible incorrect CLI behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Use the private process in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: SquirrelScan version
      placeholder: Output of squirrel --version
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [macOS, Linux glibc, Linux musl, Windows, Other]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Provide the smallest safe example. Remove credentials and private site data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
