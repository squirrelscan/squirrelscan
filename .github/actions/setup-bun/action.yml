name: Setup Bun
description: Install Bun, cache dependencies, and install packages

inputs:
  bun-version:
    description: Bun version to install
    # exact pin: "latest" makes setup-bun resolve the version via api.github.com,
    # which takes all CI down whenever GitHub's API degrades (2026-07-16 outage)
    default: 1.3.14

runs:
  using: composite
  steps:
    # wrangler ≥4.99 requires Node 22+; runners default to Node 20.
    - name: Setup Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: "22.x"

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
