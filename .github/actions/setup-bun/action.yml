name: Setup Bun
description: Install Bun, cache dependencies, and install packages

inputs:
  bun-version:
    description: Bun version to install
    # exact pin: "latest" makes setup-bun resolve the version via api.github.com,
    # which takes all CI down whenever GitHub's API degrades (2026-07-16 outage)
    default: 1.3.14

runs:
  using: composite
  steps:
    # wrangler ≥4.99 requires Node 22+; runners default to Node 20.
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "22.x"

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.bun/install/cache
          node_modules
          apps/*/node_modules
          docs/node_modules
          packages/*/node_modules
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
